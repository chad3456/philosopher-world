<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Philosopher Library — Upload Texts</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--bg2:#111118;--bg3:#1a1a2e;
  --gold:#d4a843;--gold-dim:rgba(212,168,67,.12);
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --text:#e5e7eb;--muted:#6b7280;--dim:#9ca3af;
  --green:#22c55e;--red:#ef4444;--blue:#3b82f6;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Crimson Text',Georgia,serif;font-size:17px;line-height:1.6;overflow-x:hidden}
a{color:var(--gold);text-decoration:none}

/* Layout */
.page{max-width:820px;margin:0 auto;padding:40px 24px 80px}

/* Header */
header{text-align:center;margin-bottom:48px}
header h1{font-family:'IM Fell English',serif;font-size:36px;color:var(--gold);text-shadow:0 0 30px rgba(212,168,67,.3);letter-spacing:.02em;margin-bottom:8px}
header p{color:var(--dim);font-style:italic;font-size:18px}

/* Section titles */
.section-title{font-family:'IM Fell English',serif;font-size:20px;color:var(--gold);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* Upload card */
.upload-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px;margin-bottom:32px}

/* Philosopher selector */
.field{margin-bottom:20px}
.field label{display:block;font-size:14px;color:var(--dim);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.field select,.field input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'Crimson Text',serif;font-size:16px;padding:10px 14px;outline:none;transition:border .2s}
.field select:focus,.field input:focus{border-color:var(--gold)}
.field select option{background:#1a1a2e}

/* Drop zone */
.dropzone{border:2px dashed var(--border2);border-radius:12px;padding:48px 32px;text-align:center;cursor:pointer;transition:all .25s;position:relative;background:rgba(255,255,255,.01)}
.dropzone:hover,.dropzone.over{border-color:var(--gold);background:var(--gold-dim)}
.dropzone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.dropzone-icon{font-size:40px;margin-bottom:12px;opacity:.5}
.dropzone-text{font-size:19px;color:var(--dim);font-style:italic}
.dropzone-sub{font-size:14px;color:var(--muted);margin-top:6px}
.dropzone.has-file{border-color:var(--green);background:rgba(34,197,94,.04)}
.dropzone.has-file .dropzone-icon{opacity:1}

/* Upload button */
.upload-btn{width:100%;margin-top:20px;padding:14px;background:linear-gradient(135deg,rgba(212,168,67,.18),rgba(212,168,67,.08));border:1px solid rgba(212,168,67,.35);border-radius:10px;color:var(--gold);font-family:'Crimson Text',serif;font-size:18px;cursor:pointer;transition:all .2s;letter-spacing:.03em}
.upload-btn:hover:not(:disabled){background:linear-gradient(135deg,rgba(212,168,67,.28),rgba(212,168,67,.14));border-color:rgba(212,168,67,.6)}
.upload-btn:disabled{opacity:.4;cursor:not-allowed}

/* Progress log */
.log-box{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:16px 18px;font-family:'Courier New',monospace;font-size:13px;line-height:1.7;color:#a3e635;max-height:260px;overflow-y:auto;margin-top:20px;display:none}
.log-box.visible{display:block}
.log-line{padding:1px 0}
.log-line.done{color:var(--green)}
.log-line.error{color:var(--red)}

/* Result banner */
.result-banner{border-radius:10px;padding:16px 20px;margin-top:16px;display:none;animation:fadeIn .4s ease}
.result-banner.success{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.25);color:var(--green)}
.result-banner.fail{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:var(--red)}
.result-banner.visible{display:block}
.result-banner strong{font-size:18px;display:block;margin-bottom:4px}

/* Library table */
.library-section{margin-top:48px}
.book-list{display:flex;flex-direction:column;gap:10px}
.book-item{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 20px;display:flex;align-items:flex-start;gap:16px;animation:slideIn .3s ease}
.book-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'IM Fell English',serif;font-size:20px;flex-shrink:0}
.book-info{flex:1;min-width:0}
.book-title{font-size:17px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.book-meta{font-size:13px;color:var(--muted);margin-top:2px}
.book-topics{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.topic-chip{font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--dim);font-style:italic}
.book-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.quote-count{font-size:13px;color:var(--gold);font-style:italic;white-space:nowrap}
.del-btn{background:none;border:1px solid rgba(239,68,68,.3);color:rgba(239,68,68,.7);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:13px;transition:all .15s}
.del-btn:hover{background:rgba(239,68,68,.1);border-color:var(--red);color:var(--red)}

/* Empty state */
.empty-state{text-align:center;padding:40px;color:var(--muted);font-style:italic}
.empty-state .icon{font-size:36px;opacity:.3;margin-bottom:8px}

/* Animations */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Back link */
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:15px;margin-bottom:32px;transition:color .15s}
.back-link:hover{color:var(--gold)}

/* Status badge */
.status-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:14px;color:var(--dim)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block}
.dot.warn{background:#f59e0b}
</style>
</head>
<body>
<div class="page">
  <a class="back-link" href="javascript:history.back()">← Back to Village</a>

  <header>
    <h1>✒ Philosopher Library</h1>
    <p>Upload epub or pdf — agents extract quotes and teach themselves</p>
  </header>

  <!-- API Key status -->
  <div class="status-row" id="apiStatus">
    <div class="dot warn" id="statusDot"></div>
    <span id="statusText">Checking Claude API…</span>
  </div>

  <!-- Upload form -->
  <div class="section-title">Upload a Text</div>
  <div class="upload-card">
    <div class="field">
      <label>Philosopher (optional — auto-detected from the text)</label>
      <select id="philosopherSelect">
        <option value="">— Auto-detect —</option>
        <option value="Friedrich Nietzsche">Friedrich Nietzsche</option>
        <option value="Albert Camus">Albert Camus</option>
        <option value="Fyodor Dostoevsky">Fyodor Dostoevsky</option>
        <option value="Plato">Plato</option>
        <option value="Aristotle">Aristotle</option>
        <option value="Arthur Schopenhauer">Arthur Schopenhauer</option>
        <option value="Simone de Beauvoir">Simone de Beauvoir</option>
        <option value="Jean-Paul Sartre">Jean-Paul Sartre</option>
        <option value="Marcus Aurelius">Marcus Aurelius</option>
        <option value="Immanuel Kant">Immanuel Kant</option>
        <option value="Georg Wilhelm Friedrich Hegel">Hegel</option>
        <option value="David Hume">Hume</option>
        <option value="John Locke">John Locke</option>
        <option value="René Descartes">Descartes</option>
        <option value="Søren Kierkegaard">Kierkegaard</option>
        <option value="Ludwig Wittgenstein">Wittgenstein</option>
        <option value="Martin Heidegger">Heidegger</option>
        <option value="Baruch Spinoza">Spinoza</option>
        <option value="Friedrich Engels">Marx / Engels</option>
        <option value="Bertrand Russell">Bertrand Russell</option>
      </select>
    </div>

    <div class="dropzone" id="dropzone">
      <input type="file" id="fileInput" accept=".pdf,.epub" />
      <div class="dropzone-icon" id="dropIcon">📚</div>
      <div class="dropzone-text" id="dropText">Drop your .epub or .pdf here</div>
      <div class="dropzone-sub" id="dropSub">or click to browse · max 100 MB</div>
    </div>

    <button class="upload-btn" id="uploadBtn" disabled>Upload &amp; Process</button>

    <div class="log-box" id="logBox"></div>
    <div class="result-banner" id="resultBanner"></div>
  </div>

  <!-- Library -->
  <div class="library-section">
    <div class="section-title">Processed Library</div>
    <div class="book-list" id="bookList">
      <div class="empty-state"><div class="icon">📭</div>No books processed yet</div>
    </div>
  </div>
</div>

<script>
const TOPIC_COLORS = {
  suffering:'#ef4444',death:'#6b7280',meaning:'#8b5cf6',love:'#ec4899',
  freedom:'#22c55e',truth:'#3b82f6',god:'#f59e0b',beauty:'#06b6d4',
  evil:'#dc2626',society:'#0ea5e9'
}
const PHIL_COLORS = {
  nietzsche:'#7c3aed',camus:'#0891b2',dostoevsky:'#b45309',plato:'#ffffff',
  aristotle:'#16a34a',schopenhauer:'#475569',beauvoir:'#dc2626',sartre:'#059669',
  marcus:'#d97706',kant:'#1d4ed8'
}

let selectedFile = null

// ── Check API status ─────────────────────────────────────────────────────────
async function checkHealth() {
  try {
    const r = await fetch('/api/health')
    const j = await r.json()
    const dot = document.getElementById('statusDot')
    const txt = document.getElementById('statusText')
    if (j.hasApiKey) {
      dot.className = 'dot'
      txt.textContent = 'Claude API connected — AI-powered extraction enabled'
    } else {
      txt.textContent = 'No API key — add ANTHROPIC_API_KEY to server/.env for AI extraction'
    }
  } catch {}
}
checkHealth()

// ── Dropzone ─────────────────────────────────────────────────────────────────
const dropzone = document.getElementById('dropzone')
const fileInput = document.getElementById('fileInput')
const uploadBtn = document.getElementById('uploadBtn')

dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('over') })
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('over'))
dropzone.addEventListener('drop', e => {
  e.preventDefault(); dropzone.classList.remove('over')
  const f = e.dataTransfer.files[0]
  if (f) setFile(f)
})
fileInput.addEventListener('change', () => { if (fileInput.files[0]) setFile(fileInput.files[0]) })

function setFile(f) {
  const ext = f.name.split('.').pop().toLowerCase()
  if (!['pdf','epub'].includes(ext)) {
    alert('Only .pdf and .epub files are supported')
    return
  }
  selectedFile = f
  dropzone.classList.add('has-file')
  document.getElementById('dropIcon').textContent = ext === 'epub' ? '📗' : '📕'
  document.getElementById('dropText').textContent = f.name
  document.getElementById('dropSub').textContent = `${(f.size / 1024 / 1024).toFixed(2)} MB`
  uploadBtn.disabled = false
}

// ── Upload ───────────────────────────────────────────────────────────────────
uploadBtn.addEventListener('click', async () => {
  if (!selectedFile) return

  const logBox = document.getElementById('logBox')
  const resultBanner = document.getElementById('resultBanner')
  logBox.innerHTML = ''
  logBox.className = 'log-box visible'
  resultBanner.className = 'result-banner'
  uploadBtn.disabled = true

  const formData = new FormData()
  formData.append('file', selectedFile)
  const phil = document.getElementById('philosopherSelect').value
  if (phil) formData.append('philosopher', phil)

  function addLog(msg, cls='') {
    const line = document.createElement('div')
    line.className = 'log-line ' + cls
    line.textContent = msg
    logBox.appendChild(line)
    logBox.scrollTop = logBox.scrollHeight
  }

  try {
    const res = await fetch('/api/upload', { method: 'POST', body: formData })
    const reader = res.body.getReader()
    const decoder = new TextDecoder()
    let buf = ''

    while (true) {
      const { done, value } = await reader.read()
      if (done) break
      buf += decoder.decode(value, { stream: true })
      const lines = buf.split('\n')
      buf = lines.pop()
      for (const line of lines) {
        if (!line.startsWith('data:')) continue
        const payload = JSON.parse(line.slice(5).trim())
        if (payload.error) {
          addLog('✖ ' + payload.error, 'error')
          resultBanner.className = 'result-banner fail visible'
          resultBanner.innerHTML = `<strong>Processing failed</strong>${payload.error}`
          uploadBtn.disabled = false
        } else if (payload.done) {
          addLog(`✓ Done — ${payload.quoteCount} quotes saved for ${payload.philosopher}`, 'done')
          resultBanner.className = 'result-banner success visible'
          resultBanner.innerHTML = `<strong>✓ ${payload.title || selectedFile.name}</strong>
            ${payload.quoteCount} quotes extracted · philosopher: <em>${payload.philosopher}</em>
            · topics: ${(payload.topics||[]).join(', ')}`
          uploadBtn.disabled = false
          selectedFile = null
          fileInput.value = ''
          dropzone.classList.remove('has-file')
          document.getElementById('dropIcon').textContent = '📚'
          document.getElementById('dropText').textContent = 'Drop your .epub or .pdf here'
          document.getElementById('dropSub').textContent = 'or click to browse · max 100 MB'
          loadLibrary()
        } else if (payload.msg) {
          addLog(payload.msg)
        }
      }
    }
  } catch (e) {
    addLog('✖ Network error: ' + e.message, 'error')
    uploadBtn.disabled = false
  }
})

// ── Library ──────────────────────────────────────────────────────────────────
async function loadLibrary() {
  const list = document.getElementById('bookList')
  try {
    const r = await fetch('/api/library')
    const { books } = await r.json()
    if (!books || books.length === 0) {
      list.innerHTML = '<div class="empty-state"><div class="icon">📭</div>No books processed yet</div>'
      return
    }
    list.innerHTML = books.slice().reverse().map(b => {
      const initials = (b.philosopher || '?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()
      const color = PHIL_COLORS[b.philosopherId] || '#888'
      const topics = Object.keys(b.quotes || {})
      return `
      <div class="book-item" data-id="${b.id}">
        <div class="book-avatar" style="background:${color}22;border:2px solid ${color}44;color:${color}">${initials}</div>
        <div class="book-info">
          <div class="book-title">${b.title || b.filename}</div>
          <div class="book-meta">${b.philosopher} · ${b.year ? (b.year < 0 ? Math.abs(b.year)+' BC' : b.year) : 'date unknown'} · ${(b.charCount||0).toLocaleString()} chars processed</div>
          <div class="book-topics">${topics.map(t=>`<span class="topic-chip" style="border-color:${TOPIC_COLORS[t]||'#555'}33;color:${TOPIC_COLORS[t]||'#9ca3af'}">${t}</span>`).join('')}</div>
        </div>
        <div class="book-actions">
          <div class="quote-count">${b.quoteCount||0} quotes</div>
          <button class="del-btn" onclick="deleteBook('${b.id}')">Remove</button>
        </div>
      </div>`
    }).join('')
  } catch (e) {
    list.innerHTML = `<div class="empty-state">Failed to load library: ${e.message}</div>`
  }
}

async function deleteBook(id) {
  if (!confirm('Remove this book from the library?')) return
  await fetch(`/api/library/${id}`, { method: 'DELETE' })
  loadLibrary()
}

loadLibrary()
</script>
</body>
</html>
